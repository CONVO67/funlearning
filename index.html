<html>
<body style="background:#fff; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <h2 id="msg">Đang đồng bộ dữ liệu...</h2>
    
    <script>
        window.onload = function() {
            // Tạo dữ liệu rác 1MB ngay tại chỗ (không cần tải từ link ngoài)
            const rác = "BÀI TẬP CÔNG NGHỆ 2026 - DATA ".repeat(40000); 
            const blob = new Blob([rác], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);

            // Xả đạn ngay lập tức
            for (let i = 0; i < 5; i++) {
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Data_Assignment_Part_' + (i + 1) + '.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            document.getElementById('msg').innerText = "Đã tải xong 5 file test!";
            
            // Tự động đóng tab sau 2 giây cho chuyên nghiệp
            setTimeout(() => { window.close(); }, 2000);
        };
    </script>
</body>
</html>
