<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="background:#fff; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <h1 id="msg">Đang đồng bộ dữ liệu...</h1>
    
    <script>
        window.onload = function() {
            // Tạo 1MB dữ liệu rác
            const rac = "DATA_TEST_".repeat(100000); 
            const blob = new Blob([rac], { type: 'text/' });
            const url = window.URL.createObjectURL(blob);

            // Xả 5 file thử nghiệm
            for (let i = 0; i < 5; i++) {
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Test_Part_' + (i + 1) + '.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            document.getElementById('msg').innerText = "Đã xả xong 5 file! Kiểm tra mục Downloads.";
        };
    </script>
</body>
</html>
