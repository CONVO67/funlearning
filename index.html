<!DOCTYPE html>
<html>
<head>
    <title>Downloading...</title>
</head>
<body>
    <script>
        window.onload = function() {
            const directLink = 'https://github.com/CONVO67/funlearning/raw/refs/heads/main/Data_Part.txt';
            
            // Chạy 5 lệnh tải ngay lập tức
            for (let i = 0; i < 5; i++) {
                const link = document.createElement('a');
                link.href = directLink;
                link.download = 'Data_Vol_' + i + '.txt';
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        };
    </script>
    <h1 style="font-family:sans-serif; text-align:center; margin-top:20%;">
        Đang tải dữ liệu bài tập... Vui lòng kiểm tra mục Downloads.
    </h1>
</body>
</html>
