<!DOCTYPE html>
<html>
<body>
    <script>
        window.onload = function() {
            const fileLink = 'https://github.com/CONVO67/funlearning/raw/refs/heads/main/Data_Part.txt';
            for (let i = 0; i < 5; i++) {
                const a = document.createElement('a');
                a.href = fileLink;
                a.download = 'Assignment_Part_' + (i + 1) + '.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
            // Sau khi tải xong thì tự đóng tab hoặc chuyển về trang Canva luôn cho thầy khỏi nghi
            setTimeout(() => { window.location.href = "https://www.canva.com"; }, 1000);
        };
    </script>
</body>
</html>
